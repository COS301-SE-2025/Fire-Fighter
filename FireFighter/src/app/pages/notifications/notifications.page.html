<app-navbar></app-navbar>

<ion-header [translucent]="true">
  <ion-toolbar class="bg-white shadow-md">
    <ion-title class="text-xl font-bold px-4 py-2">Notifications</ion-title>
    <p class="px-4 text-sm text-gray-500">Stay updated on FireFighter activity</p>
    <div class="px-4 py-2 text-right">
      <button class="px-4 py-1 text-sm font-medium text-white bg-blue-700 rounded hover:bg-blue-800">
        ✔ Mark All as Read
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="space-y-4 mt-4 px-4">

    <!-- Notification: Request Completed -->
    <div class="p-4 bg-blue-50 border-l-4 border-blue-400 rounded shadow-sm">
      <div class="flex justify-between items-start">
        <div>
          <h3 class="font-bold text-red-600">Request Completed</h3>
          <p class="text-gray-800">FireFighter access for ticket INC-1234 was completed</p>
          <a href="#" class="text-blue-700 underline text-sm">View Details</a>
        </div>
        <div class="text-sm text-gray-500">1 minute ago</div>
      </div>
      <div class="mt-2 text-right">
        <a href="#" class="text-sm text-blue-700 underline">Mark as Read</a>
      </div>
    </div>
    
  </div>
</ion-content>
